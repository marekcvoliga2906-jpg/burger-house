<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">Burger House animated logo</title>
  <desc id="desc">An animated burger emblem inside a circular badge.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcd67"/>
      <stop offset="100%" stop-color="#b83a1b"/>
    </linearGradient>
    <linearGradient id="bun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd97f"/>
      <stop offset="100%" stop-color="#e7a33a"/>
    </linearGradient>
    <linearGradient id="patty" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6f3518"/>
      <stop offset="100%" stop-color="#44200f"/>
    </linearGradient>
  </defs>

  <circle cx="60" cy="60" r="54" fill="url(#bg)"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>

  <g opacity="0.85">
    <path d="M31 26c4-8 10-12 14-12" fill="none" stroke="#fff4d8" stroke-linecap="round" stroke-width="4">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/>
    </path>
    <path d="M60 22c4-8 10-12 14-12" fill="none" stroke="#fff4d8" stroke-linecap="round" stroke-width="4">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite"/>
    </path>
  </g>

  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0 0;0 -2;0 0" dur="3s" repeatCount="indefinite"/>

    <path d="M28 47c0-11 14-20 32-20s32 9 32 20v5H28z" fill="url(#bun)"/>

    <g fill="#fff5d9">
      <ellipse cx="42" cy="38" rx="3" ry="1.7" transform="rotate(-12 42 38)"/>
      <ellipse cx="53" cy="34" rx="3" ry="1.7" transform="rotate(16 53 34)"/>
      <ellipse cx="66" cy="36" rx="3" ry="1.7" transform="rotate(-8 66 36)"/>
      <ellipse cx="77" cy="40" rx="3" ry="1.7" transform="rotate(14 77 40)"/>
    </g>

    <path d="M27 52h66c0 0-4 7-9 7H36c-5 0-9-7-9-7z" fill="#5ea334">
      <animate attributeName="d" dur="2.8s" repeatCount="indefinite"
        values="M27 52h66c0 0-4 7-9 7H36c-5 0-9-7-9-7z;
                M27 53h66c0 0-4 6-9 7H36c-5 0-9-6-9-7z;
                M27 52h66c0 0-4 7-9 7H36c-5 0-9-7-9-7z"/>
    </path>

    <rect x="30" y="60" width="60" height="8" rx="4" fill="#f1bf4c"/>

    <rect x="26" y="67" width="68" height="14" rx="7" fill="url(#patty)">
      <animate attributeName="y" values="67;68;67" dur="2.8s" repeatCount="indefinite"/>
    </rect>

    <path d="M30 81h60a0 0 0 0 1 0 0v6c0 8-7 14-15 14H45c-8 0-15-6-15-14v-6a0 0 0 0 1 0 0z" fill="url(#bun)"/>
  </g>

  <g>
    <circle cx="94" cy="28" r="4" fill="#fff8e4">
      <animate attributeName="r" values="3.2;4.5;3.2" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <path d="M94 18v6M94 32v6M84 28h6M98 28h6" stroke="#fff8e4" stroke-linecap="round" stroke-width="2.5">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="1.8s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
